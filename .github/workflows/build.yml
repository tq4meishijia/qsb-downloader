name: 📦 Auto Build Windows Application

on:
  push:
    tags:
      - 'v*.*.*'  # 推送 v1.0.0 格式标签时自动触发
  workflow_dispatch:  # 允许手动触发（GitHub UI 按钮）

jobs:
  build-windows:
    runs-on: windows-latest
    permissions:
      contents: write  # 允许创建 Release
    
    steps:
      # =============== 1. 检出代码 ===============
      - name: 📥 Checkout repository
        uses: actions/checkout@v4

      # =============== 2. 设置 Python 环境 ===============
      - name: 🐍 Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      # =============== 3. 安装构建依赖 ===============
      - name: ⚙️ Install build dependencies
        run: |
          python -m pip install --upgrade pip setuptools wheel
          pip install pyinstaller==6.3.0 selenium==4.19.0 pillow==10.2.0
        shell: pwsh

      # =============== 4. 使用预装 EdgeDriver（关键修复！） ===============
      - name: 🌐 Use pre-installed EdgeDriver (GitHub Actions)
        run: |
          $driverSource = "C:\SeleniumWebDrivers\EdgeDriver\msedgedriver.exe"
          $driverDest = "msedgedriver.exe"
          
          Write-Host "🔍 Checking for pre-installed EdgeDriver at $driverSource..."
          
          if (Test-Path $driverSource) {
            # 显示驱动版本信息
            $versionInfo = & $driverSource --version 2>&1
            Write-Host "✅ Found EdgeDriver! Version: $versionInfo"
            
            # 复制到项目根目录
            Copy-Item $driverSource -Destination $driverDest -Force
            
            # 验证复制成功
            if (Test-Path $driverDest) {
              $sizeKB = [math]::Round((Get-Item $driverDest).Length / 1KB, 2)
              Write-Host "✅ Successfully copied EdgeDriver to project root ($sizeKB KB)"
              
              # 显示浏览器版本（用于兼容性参考）
              $browserPath = "C:\Program Files (x86)\Microsoft\Edge\Application\msedge.exe"
              if (Test-Path $browserPath) {
                $browserVer = (Get-Item $browserPath).VersionInfo.ProductVersion
                Write-Host "ℹ️  Microsoft Edge Browser Version: $browserVer"
              }
            } else {
              Write-Error "❌ Failed to copy EdgeDriver to project root"
              exit 1
            }
          } else {
            Write-Error "❌ CRITICAL: Pre-installed EdgeDriver not found at $driverSource"
            Write-Error "This should NEVER happen on GitHub Actions Windows runners."
            exit 1
          }
        shell: pwsh

      # =============== 5. PyInstaller 打包（单行命令修复） ===============
      - name: 📦 Build executable with PyInstaller
        run: pyinstaller --onefile --windowed --add-binary "msedgedriver.exe;." --name "箐师帮试卷下载工具" --icon=NONE --clean --log-level=WARN main.py
        shell: pwsh

      # =============== 6. 验证构建结果 ===============
      - name: 🔍 Verify build output
        run: |
          $exePath = "dist\箐师帮试卷下载工具.exe"
          if (Test-Path $exePath) {
            $fileSize = [math]::Round((Get-Item $exePath).Length / 1MB, 2)
            Write-Host "✅ Build successful! Executable size: $fileSize MB"
            Write-Host "📄 File details:"
            Get-Item $exePath | Format-List Name, Length, LastWriteTime
          } else {
            Write-Error "❌ Build failed! Executable not found at $exePath"
            # 显示 dist 目录内容便于调试
            Write-Host "🔍 Checking dist directory contents:"
            Get-ChildItem dist -Recurse | Format-Table Name, Length, LastWriteTime
            exit 1
          }
        shell: pwsh

      # =============== 7. 上传构建产物（Actions 工件） ===============
      - name: 📤 Upload artifact to GitHub Actions
        uses: actions/upload-artifact@v4
        with:
          name: windows-build-${{ github.ref_name }}
          path: dist/箐师帮试卷下载工具.exe
          retention-days: 30

      # =============== 8. 创建 GitHub Release（仅标签触发时） ===============
      - name: 🎁 Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/箐师帮试卷下载工具.exe
          tag_name: ${{ github.ref_name }}
          name: "Release ${{ github.ref_name }}"
          body: |
            ## 📦 箐师帮试卷下载工具 ${{ github.ref_name }}
            
            ✅ **自动构建的 Windows 可执行文件（含内置 EdgeDriver）**
            
            ### ✨ 特性
            - 无需额外安装 EdgeDriver（已完美集成）
            - 单文件绿色版，即下即用
            - 专为 Windows 10/11 优化
            
            ### 📥 使用说明
            1. 下载 `箐师帮试卷下载工具.exe`
            2. 双击运行（需已安装 Microsoft Edge 浏览器）
            3. 首次运行若被拦截：右键 → "以管理员身份运行" → 选择"仍要运行"
            
            ### ⚠️ 重要提示
            - 本程序仅在 **Windows 10/11** 环境下运行
            - 需系统已安装 **Microsoft Edge 浏览器**（Windows 自带）
            - 杀毒软件可能误报（程序无害，可添加信任）
            
            ### 🔒 安全说明
            所有构建均在 GitHub 官方安全环境完成，无任何第三方干预。
            源代码完全开源，欢迎审计。
            
            ### 📊 构建信息
            - Python: 3.11
            - PyInstaller: 6.3.0
            - Selenium: 4.19.0
            - EdgeDriver: 预装版本（与 GitHub Actions 环境匹配）
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
